<h2>Request Tester</h2>
<label>
  Endpoint:
  <select [(ngModel)]="endpoint">
    <option *ngFor="let path of endpoints" [value]="rateLimitService.withApiBase(path)">
      {{ path }}
    </option>
  </select>
</label>
<button (click)="sendRequest()">Send Request</button>

<div *ngIf="errorMessage" class="error">
  {{ errorMessage }}
</div>

<h3>Response</h3>
<p>Status: {{ response.status }}</p>
<pre>{{ response.body | json }}</pre>

<h3>Headers <button (click)="explainHeaders()">Explain</button></h3>
<ul>
  <li *ngFor="let header of headers | keyvalue">{{ header.key }}: {{ header.value }}</li>
</ul>
