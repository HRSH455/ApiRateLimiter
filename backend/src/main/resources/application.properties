spring.application.name=RateLimiter

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Rate Limit Defaults
rate-limit.default-limit=100
rate-limit.default-window-secs=60

# Route 1 - Auth
rate-limit.routes[0].path=/api/auth/**
rate-limit.routes[0].limit=5
rate-limit.routes[0].window-secs=900
rate-limit.routes[0].strategy=fixed-window

# Route 2 - Search
rate-limit.routes[1].path=/api/search/**
rate-limit.routes[1].limit=30
rate-limit.routes[1].window-secs=60
rate-limit.routes[1].strategy=sliding-window

# Route 3 - Upload
rate-limit.routes[2].path=/api/upload/**
rate-limit.routes[2].limit=10
rate-limit.routes[2].window-secs=3600
rate-limit.routes[2].strategy=fixed-window

# Route 4 - General API
rate-limit.routes[3].path=/api/**
rate-limit.routes[3].limit=100
rate-limit.routes[3].window-secs=60
rate-limit.routes[3].strategy=sliding-window